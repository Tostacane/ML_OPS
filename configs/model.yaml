model:
  name: logistic_regression

  logistic_regression:
    max_iter: 500
    class_weight: balanced
    random_state: 101

  knn:
    n_neighbors: 5
    weights: distance
    metric: minkowski

  gradient_boosting:
    n_estimators: 150
    learning_rate: 0.05
    max_depth: 3
    random_state: 101

  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 101
    n_jobs: -1
